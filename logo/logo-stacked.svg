<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520" role="img" aria-label="The Vine stacked logo">
  <!--
    THE VINE - Stacked Logo Lockup (editorial / woodcut)
    Usage: Flyers, banners, yard signs, merch, splash screens, social media profiles
    Colors: Teal #2a5f5b, Rust #c8553d, Cream #f4ede0, Ink #1f1d18, Gold #b88828
    Fonts: Playfair Display (display), Inter (sans), Caveat (script)

    Designed for The Vine Church - Athens, Tennessee
    "Where You Already Belong"
  -->

  <!-- ============================================================
       ICON MARK (centered, larger for stacked layout)
       ============================================================ -->
  <g transform="translate(100, 15) scale(1.0)">
    <!-- Solid leaf body (teal) with thick ink outline -->
    <path d="M100 188 C100 188 38 138 38 82 C38 40 64 12 100 4 C136 12 162 40 162 82 C162 138 100 188 100 188Z"
          fill="#2a5f5b" stroke="#1f1d18" stroke-width="6" stroke-linejoin="round"/>

    <!-- Inner highlight stripe for print-block depth -->
    <path d="M100 178 C100 178 50 132 50 82 C50 48 70 22 100 16 L100 178Z"
          fill="#357b76" opacity="0.6"/>

    <!-- Central trunk in cream -->
    <path d="M100 32 L100 162" stroke="#f4ede0" stroke-width="6" stroke-linecap="round"/>

    <!-- Three branches, cream -->
    <path d="M100 60 C84 52 70 56 60 64" fill="none" stroke="#f4ede0" stroke-width="5" stroke-linecap="round"/>
    <path d="M100 92 C116 84 130 88 140 96" fill="none" stroke="#f4ede0" stroke-width="5" stroke-linecap="round"/>
    <path d="M100 124 C84 116 70 120 60 132" fill="none" stroke="#f4ede0" stroke-width="5" stroke-linecap="round"/>

    <!-- Leaf shapes at branch tips -->
    <ellipse cx="56" cy="64" rx="8" ry="4.5" fill="#f4ede0" transform="rotate(-30 56 64)"/>
    <ellipse cx="144" cy="96" rx="8" ry="4.5" fill="#f4ede0" transform="rotate(30 144 96)"/>
    <ellipse cx="56" cy="132" rx="8" ry="4.5" fill="#f4ede0" transform="rotate(-30 56 132)"/>

    <!-- Junction nodes in rust -->
    <circle cx="100" cy="60" r="6" fill="#c8553d"/>
    <circle cx="100" cy="92" r="6" fill="#c8553d"/>
    <circle cx="100" cy="124" r="6" fill="#c8553d"/>

    <!-- Antique gold fruit at the base -->
    <circle cx="100" cy="156" r="8" fill="#b88828"/>
    <circle cx="100" cy="156" r="3" fill="#1f1d18" opacity="0.45"/>
  </g>

  <!-- ============================================================
       TYPOGRAPHY (centered below icon)
       ============================================================ -->

  <!-- Decorative rule -->
  <line x1="150" y1="225" x2="250" y2="225" stroke="#1f1d18" stroke-width="1" opacity="0.2"/>

  <!-- "The" - italic serif, centered -->
  <text
    x="200" y="272"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-size="24"
    font-weight="400"
    font-style="italic"
    fill="#6b6556"
    letter-spacing="0.2em"
  >The</text>

  <!-- "Vine" - bold display serif, centered -->
  <text
    x="200" y="345"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-size="80"
    font-weight="700"
    fill="#1f1d18"
    letter-spacing="-0.03em"
  >Vine</text>

  <!-- Decorative rule below title -->
  <line x1="120" y1="365" x2="280" y2="365" stroke="#c8553d" stroke-width="2" opacity="0.5"/>

  <!-- Tagline: "where you already belong" - handwritten, rust, centered -->
  <text
    x="200" y="400"
    text-anchor="middle"
    font-family="'Caveat', cursive"
    font-size="24"
    font-weight="400"
    fill="#c8553d"
    opacity="0.9"
  >where you already belong</text>

  <!-- ============================================================
       FOOTER INFO
       ============================================================ -->

  <!-- Location line -->
  <text
    x="200" y="445"
    text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="12"
    font-weight="400"
    fill="#8e8775"
    letter-spacing="0.15em"
  >Athens, Tennessee</text>

  <!-- Website -->
  <text
    x="200" y="468"
    text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="11"
    font-weight="400"
    fill="#2a5f5b"
    opacity="0.7"
    letter-spacing="0.05em"
  >thevineathens.church</text>

  <!-- Scripture reference -->
  <text
    x="200" y="500"
    text-anchor="middle"
    font-family="'Caveat', cursive"
    font-size="13"
    font-weight="400"
    fill="#8e8775"
  >John 15:5</text>

</svg>
