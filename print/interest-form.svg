<?xml version="1.0" encoding="UTF-8"?>
<!--
  THE VINE - Interest Form (Camera-Ready)
  Trim: 8.5" x 11" (letter) at 300 DPI = 2550 x 3300 units
  Bleed: 1/8" (37.5 units) on all sides = document 2625 x 3375
  Crop marks: included at trim corners

  Print workflow: Open in Illustrator/Inkscape, export to PDF, send to printer
  Fonts: Playfair Display, Lora, Inter, JetBrains Mono, Caveat
         (must be installed or outlined before print)

  Colors: Editorial palette (matches thevineathens.church)
    Paper: #f4ede0     Paper-warm: #f8f1e3    Ink-900: #1f1d18
    Ink-700: #3a362d   Ink-500: #6b6556       Ink-400: #8e8775
    Ink-200: #d2cab6   Rust-500: #c8553d      Rust-700: #a44427
    Teal-500: #2a5f5b  Gold-500: #b88828

  Form fields: white fill (#ffffff) for handwritten legibility
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-37.5 -37.5 2625 3375" width="2625" height="3375">
  <defs>
    <radialGradient id="header-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a2620"/>
      <stop offset="100%" stop-color="#1f1d18"/>
    </radialGradient>
  </defs>

  <!-- Background (paper, extended to bleed) -->
  <rect x="-37.5" y="-37.5" width="2625" height="3375" fill="#f4ede0"/>

  <!-- ===== HEADER (dark editorial band) ===== -->
  <g transform="translate(0, 0)">
    <rect x="-37.5" y="-37.5" width="2625" height="337.5" fill="url(#header-bg)"/>
    <!-- Thin rust rule at header bottom -->
    <line x1="0" y1="298" x2="2550" y2="298" stroke="#c8553d" stroke-width="2" opacity="0.5"/>

    <!-- Woodcut leaf logo -->
    <g transform="translate(140, 80) scale(0.65) translate(-100, -96)">
      <path d="M100 188 C100 188 38 138 38 82 C38 40 64 12 100 4 C136 12 162 40 162 82 C162 138 100 188 100 188Z"
            fill="#2a5f5b" stroke="#3a362d" stroke-width="5" stroke-linejoin="round"/>
      <path d="M100 178 C100 178 50 132 50 82 C50 48 70 22 100 16 L100 178Z"
            fill="#357b76" opacity="0.5"/>
      <path d="M100 32 L100 162" stroke="#f4ede0" stroke-width="5" stroke-linecap="round"/>
      <path d="M100 60 C84 52 70 56 60 64" fill="none" stroke="#f4ede0" stroke-width="4" stroke-linecap="round"/>
      <path d="M100 92 C116 84 130 88 140 96" fill="none" stroke="#f4ede0" stroke-width="4" stroke-linecap="round"/>
      <path d="M100 124 C84 116 70 120 60 132" fill="none" stroke="#f4ede0" stroke-width="4" stroke-linecap="round"/>
      <circle cx="100" cy="60" r="5" fill="#c8553d"/>
      <circle cx="100" cy="92" r="5" fill="#c8553d"/>
      <circle cx="100" cy="124" r="5" fill="#c8553d"/>
      <circle cx="100" cy="156" r="7" fill="#b88828"/>
    </g>

    <!-- Title + tagline -->
    <text x="280" y="115" font-family="'Playfair Display', Georgia, serif"
          font-size="76" font-weight="900" font-style="italic" fill="#f4ede0">The Vine</text>
    <text x="280" y="200" font-family="'Caveat', cursive"
          font-size="48" font-weight="700" fill="#b88828" opacity="0.9">Where You Already Belong</text>
  </g>

  <!-- ===== INTRO ===== -->
  <g transform="translate(0, 340)">
    <!-- Section label (editorial dept style) -->
    <rect x="140" y="15" width="260" height="42" fill="#f8f1e3" stroke="#1f1d18" stroke-width="1.5"/>
    <text x="156" y="44" font-family="'JetBrains Mono', monospace"
          font-size="14" font-weight="700" fill="#1f1d18" letter-spacing="2px"><tspan fill="#c8553d">01</tspan>  SAY HELLO</text>

    <text x="140" y="115" font-family="'Lora', Georgia, serif"
          font-size="42" font-style="italic" fill="#6b6556">We'd love to hear from you. No spam, no pressure</text>
    <text x="140" y="170" font-family="'Lora', Georgia, serif"
          font-size="42" font-style="italic" fill="#6b6556">&#x2014; just a real person who cares.</text>
  </g>

  <!-- ===== FORM FIELDS ===== -->
  <g transform="translate(0, 600)">
    <!-- Name + Phone row -->
    <g>
      <text x="140" y="0" font-family="'JetBrains Mono', monospace" font-size="26" fill="#8e8775" letter-spacing="1.5px">NAME</text>
      <rect x="140" y="25" width="1020" height="100" rx="0" fill="#ffffff" stroke="#1f1d18" stroke-width="1.5"/>
      <text x="165" y="86" font-family="'Lora', Georgia, serif" font-size="36" fill="#d2cab6" font-style="italic">What should we call you?</text>

      <text x="1230" y="0" font-family="'JetBrains Mono', monospace" font-size="26" fill="#8e8775" letter-spacing="1.5px">PHONE</text>
      <rect x="1230" y="25" width="1020" height="100" rx="0" fill="#ffffff" stroke="#1f1d18" stroke-width="1.5"/>
      <text x="1255" y="86" font-family="'Lora', Georgia, serif" font-size="36" fill="#d2cab6" font-style="italic">(423) 555-1234</text>
    </g>

    <!-- Email -->
    <g transform="translate(0, 165)">
      <text x="140" y="0" font-family="'JetBrains Mono', monospace" font-size="26" fill="#8e8775" letter-spacing="1.5px">EMAIL</text>
      <rect x="140" y="25" width="2110" height="100" rx="0" fill="#ffffff" stroke="#1f1d18" stroke-width="1.5"/>
      <text x="165" y="86" font-family="'Lora', Georgia, serif" font-size="36" fill="#d2cab6" font-style="italic">your@email.com</text>
    </g>

    <!-- Section: What brings you here? -->
    <g transform="translate(0, 400)">
      <!-- Section label -->
      <rect x="140" y="0" width="500" height="42" fill="#f8f1e3" stroke="#1f1d18" stroke-width="1.5"/>
      <text x="156" y="30" font-family="'JetBrains Mono', monospace"
            font-size="14" font-weight="700" fill="#1f1d18" letter-spacing="2px"><tspan fill="#c8553d">02</tspan>  WHAT BRINGS YOU HERE?</text>

      <!-- Checkbox grid 2x3 -->
      <!-- Row 1 -->
      <g transform="translate(140, 65)">
        <g>

          <rect x="26" y="26" width="34" height="34" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="80" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1f1d18">Visiting this Sunday</text>
          <text x="80" y="86" font-family="'Lora', Georgia, serif" font-size="26" font-style="italic" fill="#8e8775">First time or coming back</text>
        </g>
        <g transform="translate(1050, 0)">

          <rect x="26" y="26" width="34" height="34" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="80" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1f1d18">Finding a community group</text>
          <text x="80" y="86" font-family="'Lora', Georgia, serif" font-size="26" font-style="italic" fill="#8e8775">Gaming, coffee, rides, worship, etc.</text>
        </g>
      </g>

      <!-- Row 2 -->
      <g transform="translate(140, 215)">
        <g>

          <rect x="26" y="26" width="34" height="34" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="80" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1f1d18">Serving / volunteering</text>
          <text x="80" y="86" font-family="'Lora', Georgia, serif" font-size="26" font-style="italic" fill="#8e8775">Help with events, tech, outreach</text>
        </g>
        <g transform="translate(1050, 0)">

          <rect x="26" y="26" width="34" height="34" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="80" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1f1d18">Questions about faith</text>
          <text x="80" y="86" font-family="'Lora', Georgia, serif" font-size="26" font-style="italic" fill="#8e8775">Just exploring, no pressure</text>
        </g>
      </g>

      <!-- Row 3 -->
      <g transform="translate(140, 365)">
        <g>

          <rect x="26" y="26" width="34" height="34" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="80" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1f1d18">Prayer request</text>
          <text x="80" y="86" font-family="'Lora', Georgia, serif" font-size="26" font-style="italic" fill="#8e8775">We'd love to pray with you</text>
        </g>
        <g transform="translate(1050, 0)">

          <rect x="26" y="26" width="34" height="34" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="80" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1f1d18">Something else</text>
          <text x="80" y="86" font-family="'Lora', Georgia, serif" font-size="26" font-style="italic" fill="#8e8775">Tell us in the notes below</text>
        </g>
      </g>
    </g>

    <!-- Notes textarea -->
    <g transform="translate(0, 940)">
      <text x="140" y="0" font-family="'JetBrains Mono', monospace" font-size="26" fill="#8e8775" letter-spacing="1.5px">NOTES / MESSAGE</text>
      <rect x="140" y="25" width="2110" height="350" rx="0" fill="#ffffff" stroke="#1f1d18" stroke-width="1.5"/>
      <text x="165" y="76" font-family="'Lora', Georgia, serif" font-size="36" fill="#d2cab6" font-style="italic">Anything else you'd like us to know? Questions, prayer requests,</text>
      <text x="165" y="120" font-family="'Lora', Georgia, serif" font-size="36" fill="#d2cab6" font-style="italic">or just saying hi...</text>
    </g>

    <!-- Branches section -->
    <g transform="translate(0, 1340)">
      <!-- Section label -->
      <rect x="140" y="0" width="240" height="42" fill="#f8f1e3" stroke="#1f1d18" stroke-width="1.5"/>
      <text x="156" y="30" font-family="'JetBrains Mono', monospace"
            font-size="14" font-weight="700" fill="#1f1d18" letter-spacing="2px"><tspan fill="#c8553d">03</tspan>  BRANCHES</text>

      <text x="410" y="30" font-family="'Lora', Georgia, serif"
            font-size="28" font-style="italic" fill="#6b6556">Community done different. Who are your people?</text>

      <!-- Branch checkboxes Row 1 -->
      <g transform="translate(140, 70)">
        <g>

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">ROOT ACCESS</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Vine Men</text>
        </g>
        <g transform="translate(700, 0)">

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">WILDFLOWERS</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Vine Women</text>
        </g>
        <g transform="translate(1400, 0)">

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">SPROUTS</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Vine Kids</text>
        </g>
      </g>

      <!-- Row 2 -->
      <g transform="translate(140, 210)">
        <g>

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">SERVE</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Community Outreach</text>
        </g>
        <g transform="translate(700, 0)">

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">BASECAMP</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Outdoor Activities</text>
        </g>
        <g transform="translate(1400, 0)">

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">CONFIG</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Free Tech Help Clinics</text>
        </g>
      </g>

      <!-- Row 3 -->
      <g transform="translate(140, 350)">
        <g>

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">AMPLIFIED</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Open Worship and Jam Night</text>
        </g>
        <g transform="translate(700, 0)">

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">CHURCH2U</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Food Delivery and Cookouts</text>
        </g>
        <g transform="translate(1400, 0)">

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'JetBrains Mono', monospace" font-size="22" fill="#c8553d" font-weight="700" letter-spacing="1px">THEOLOGY PIE</text>
          <text x="72" y="80" font-family="'Lora', Georgia, serif" font-size="26" fill="#6b6556" font-style="italic">Quarterly Pizza and Theology</text>
        </g>
      </g>

      <!-- Row 4: Write-in -->
      <g transform="translate(140, 490)">
        <g>

          <rect x="24" y="24" width="30" height="30" rx="0" fill="#ffffff" stroke="#c8553d" stroke-width="2.5"/>
          <text x="72" y="44" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="700" fill="#1f1d18">What interests you?</text>
          <rect x="72" y="66" width="1244" height="40" rx="0" fill="#ffffff" stroke="#1f1d18" stroke-width="1"/>
        </g>
      </g>
    </g>
  </g>

  <!-- ===== BOTTOM CONTACT ===== -->
  <g transform="translate(0, 3100)">
    <!-- Dark editorial footer band -->
    <rect x="-37.5" y="0" width="2625" height="240" fill="#1f1d18"/>
    <line x1="100" y1="20" x2="2450" y2="20" stroke="#3a362d" stroke-width="1.5"/>

    <!-- Contact info centered -->
    <text x="1275" y="90" text-anchor="middle"
          font-family="'Playfair Display', Georgia, serif"
          font-size="40" font-weight="700" font-style="italic" fill="#c8553d">Give us a call</text>
    <text x="1275" y="140" text-anchor="middle"
          font-family="'Inter', sans-serif"
          font-size="42" fill="#f4ede0" font-weight="700">423.216.4433</text>
    <text x="1275" y="190" text-anchor="middle"
          font-family="'Lora', Georgia, serif"
          font-size="30" font-style="italic" fill="#b1aa97">Athens, TN  &#x2022;  thevineathens.church</text>
  </g>

  <!-- ===== CROP MARKS (trim corners) ===== -->
  <g stroke="#000000" stroke-width="1" fill="none">
    <path d="M-15,0 L0,0 L0,-15"/>
    <path d="M2550,-15 L2550,0 L2565,0"/>
    <path d="M-15,3300 L0,3300 L0,3315"/>
    <path d="M2550,3315 L2550,3300 L2565,3300"/>
  </g>
</svg>
